{% extends 'MyInventoryApp/base.html' %}
{% load static %}

{% block content %}

<div class="container-fluid">
    <div class="col-md-10">
        <div class="col-10">
            <div class="card">
                <div class="card-header">
                    <b>Login</b>
                </div>

                <div class="card-body">

                    {% if error %}
                        <div class="alert alert-danger">
                            {{ error }}
                        </div>
                    {% endif %}
                    
                    {% if message %}
                    <div class="alert alert-success">
                        {{ message }}
                    </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text"
                                   class="form-control"
                                   id="username"
                                   name="username"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password"
                                   class="form-control"
                                   id="password"
                                   name="password"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            Login
                        </button>

                        <a href="{% url 'signup' %}" class="btn btn-secondary">
                            Sign Up
                        </a>
                        <a href="{% url 'home' %}"

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
