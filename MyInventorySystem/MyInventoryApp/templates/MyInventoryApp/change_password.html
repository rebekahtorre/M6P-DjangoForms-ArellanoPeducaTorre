{% extends 'MyInventoryApp/base.html' %}

{% block content %}

<div class="card">
    <div class="card-header">
        <b>Change Password</b>
    </div>

    <div class="card-body">

        {% if message %}
            <div class="alert alert-danger">{{ message }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-control" name="current_password" required>
            </div>

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" class="form-control" name="new_password1" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Re-enter New Password</label>
                <input type="password" class="form-control" name="new_password2" required>
            </div>

            <button type="submit" class="btn btn-primary">Confirm</button>
            <a class="btn btn-secondary" href="{% url 'manage_account' pk=acc.pk %}">Cancel</a>
        </form>

    </div>
</div>

{% endblock %}
